<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expo V2</title>

    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Expo V2">

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='black'/><circle cx='50' cy='50' r='25' fill='white'/></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='black'/><circle cx='50' cy='50' r='25' fill='white'/></svg>">

    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Expo%20V2%22,%22short_name%22:%22Expo%20V2%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23ffffff%22,%22theme_color%22:%22%23ffffff%22,%22icons%22:[{%22src%22:%22data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='black'/><circle cx='50' cy='50' r='25' fill='white'/></svg>%22,%22sizes%22:%22512x512%22,%22type%22:%22image/svg+xml%22,%22purpose%22:%22any%20maskable%22}]}">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #202124;
            --blue: #1a73e8;
            --green: #34a853;
            --red: #ea4335;
            --black: #1a1a1a;
            --gray: #70757a;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        .app-container { width: 100%; max-width: 500px; padding: 20px; flex-grow: 1; box-sizing: border-box; }

        header {
            width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
        }

        .hero-card {
            background: var(--black); color: white; padding: 35px 20px;
            border-radius: 28px; box-shadow: 0 12px 24px rgba(0,0,0,0.15);
            margin-bottom: 25px; text-align: center;
        }

        .net-worth-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.8; margin-bottom: 8px; }
        .net-worth-value { 
            font-size: clamp(22px, 7vw, 40px); font-weight: 800; margin: 0;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .input-group {
            background: var(--card); padding: 25px; border-radius: 24px;
            border: 1px solid #e0e0e0; margin-bottom: 25px;
        }

        input {
            width: 100%; padding: 14px; margin: 10px 0;
            border: 1px solid #dadce0; border-radius: 12px;
            box-sizing: border-box; font-size: 16px; outline: none;
        }

        .btn {
            width: 100%; padding: 16px; border: none; border-radius: 14px;
            font-weight: 700; cursor: pointer; font-size: 16px; transition: 0.2s;
        }
        .btn-primary { background: var(--blue); color: white; margin-top: 10px; }

        .btn-outline {
            background: transparent; border: 1px solid #dadce0; color: var(--gray);
            padding: 8px 12px; font-size: 11px; width: auto; font-weight: 600;
        }

        .history-card { background: var(--card); border-radius: 24px; border: 1px solid #e0e0e0; overflow: hidden; margin-bottom: 40px; }
        .history-header { padding: 15px 20px; border-bottom: 1px solid #f1f1f1; }
        .history-item { padding: 16px 20px; border-bottom: 1px solid #f8f9fa; display: flex; justify-content: space-between; align-items: center; }
        
        .amount-pos { color: var(--green); font-weight: 700; }
        .amount-neg { color: var(--red); font-weight: 700; }

        /* Footer */
        footer {
            background: var(--black); color: #888; width: 100%; padding: 40px 20px;
            box-sizing: border-box; text-align: center; font-size: 12px;
        }
        .footer-links { margin: 15px 0; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .footer-links span { cursor: pointer; text-decoration: underline; transition: 0.2s; }
        .footer-links span:hover { color: white; }

        /* Modal / Popup Styles */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; z-index: 5000;
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; width: 90%; max-width: 450px; max-height: 80vh;
            border-radius: 24px; padding: 30px; overflow-y: auto; position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .modal-header { font-size: 20px; font-weight: 800; margin-bottom: 15px; color: var(--black); }
        .modal-body { font-size: 14px; line-height: 1.6; color: var(--text); }
        .close-modal {
            background: var(--black); color: white; border: none; padding: 10px 20px;
            border-radius: 10px; margin-top: 20px; cursor: pointer; width: 100%; font-weight: 700;
        }

        #install-prompt {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: white; padding: 20px; border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2); display: none; z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1 style="margin:0; font-size: 20px; font-weight: 800;">EXPO V2</h1>
            <div style="display: flex; gap: 8px;">
                <button class="btn-outline" onclick="clearRecords()">Reset</button>
                <button class="btn-outline" onclick="exportPDF()" style="color: var(--blue); border-color: var(--blue);">Download Report</button>
            </div>
        </header>

        <div class="hero-card">
            <div class="net-worth-label">Total Net Worth</div>
            <div class="net-worth-value" id="balance">R 0.00</div>
        </div>

        <div class="input-group">
            <input type="text" id="desc" placeholder="Label">
            <input type="number" id="amt" placeholder="Amount (±)">
            <button class="btn btn-primary" onclick="addEntry()">Add Transaction</button>
        </div>

        <div class="history-card">
            <div class="history-header">
                <span style="font-size: 12px; font-weight: 700; color: var(--gray);">HISTORY</span>
            </div>
            <div id="history"></div>
        </div>
    </div>

    <footer>
        <div style="font-weight: 800; color: white; font-size: 16px;">EXPO V2</div>
        <div class="footer-links">
            <span onclick="openModal('privacy')">Privacy Policy</span>
            <span onclick="openModal('terms')">Terms of Use</span>
            <span onclick="openModal('conditions')">Conditions</span>
        </div>
        <p>&copy; 2026 Expo V2 Accounting. All rights reserved.<br>Locally developed in Pretoria, South Africa.</p>
    </footer>

    <div id="modal-container" class="modal">
        <div class="modal-content">
            <div id="modal-header" class="modal-header"></div>
            <div id="modal-body" class="modal-body"></div>
            <button class="close-modal" onclick="closeModal()">Close</button>
        </div>
    </div>

    <div id="install-prompt">
        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 15px;">
            <div style="width:40px; height:40px; background:black; border-radius:10px; display:flex; align-items:center; justify-content:center;">
                <div style="width:15px; height:15px; background:white; border-radius:50%;"></div>
            </div>
            <strong style="font-size: 14px;">Add Expo V2 to Home Screen</strong>
        </div>
        <button class="btn btn-primary" onclick="installApp()" style="margin:0;">Install</button>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('expo_v2_pwa_final')) || [];
        let deferredPrompt;

        // Legal Content
        const legalData = {
            privacy: {
                title: "Privacy Policy",
                body: "Expo V2 values your privacy. <strong>Data Storage:</strong> All financial data is stored locally on your device via LocalStorage. We do not transmit, sell, or view your transaction history. <strong>PWA Analytics:</strong> We do not track user behavior or location. Your data remains on your phone until you manually clear it."
            },
            terms: {
                title: "Terms of Use",
                body: "By using Expo V2, you agree that this application is provided 'as is' for personal financial tracking. <strong>Accuracy:</strong> While we strive for mathematical precision, Expo V2 is not a replacement for certified accounting software. Users are responsible for maintaining their own financial backups via the 'Download Report' feature."
            },
            conditions: {
                title: "Terms & Conditions",
                body: "<strong>Ownership:</strong> Expo V2 is a proprietary digital tool. <strong>Liability:</strong> We are not liable for financial losses, data corruption, or device failure. <strong>Local Use:</strong> This app is designed for standalone use. No cloud-syncing is currently offered, meaning clearing your browser cache may result in data loss."
            }
        };

        function openModal(type) {
            document.getElementById('modal-header').innerText = legalData[type].title;
            document.getElementById('modal-body').innerHTML = legalData[type].body;
            document.getElementById('modal-container').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal-container').style.display = 'none'; }

        // Core Logic
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const sw = `self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));`;
                const blob = new Blob([sw], {type: 'application/javascript'});
                navigator.serviceWorker.register(URL.createObjectURL(blob));
            });
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            document.getElementById('install-prompt').style.display = 'block';
        });

        async function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') document.getElementById('install-prompt').style.display = 'none';
                deferredPrompt = null;
            }
        }

        function updateUI() {
            const history = document.getElementById('history');
            const balanceEl = document.getElementById('balance');
            history.innerHTML = '';
            let total = 0;

            transactions.slice().reverse().forEach((t) => {
                total += t.amount;
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <div style="display:flex; flex-direction:column;">
                        <span style="font-weight:600; font-size:13px;">${t.desc.toUpperCase()}</span>
                        <span style="font-size:10px; color:var(--gray);">${t.date}</span>
                    </div>
                    <span class="${t.amount >= 0 ? 'amount-pos' : 'amount-neg'}">
                        ${t.amount >= 0 ? '+' : ''} R ${t.amount.toLocaleString(undefined, {minimumFractionDigits: 2})}
                    </span>
                `;
                history.appendChild(item);
            });

            balanceEl.innerText = `R ${total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            localStorage.setItem('expo_v2_pwa_final', JSON.stringify(transactions));
        }

        function addEntry() {
            const desc = document.getElementById('desc').value;
            const amt = parseFloat(document.getElementById('amt').value);
            if(!desc || isNaN(amt)) return;

            transactions.push({ desc: desc, amount: amt, date: new Date().toLocaleDateString('en-ZA') });
            document.getElementById('desc').value = '';
            document.getElementById('amt').value = '';
            updateUI();
        }

        function clearRecords() {
            if (confirm("Permanently wipe all records?")) {
                transactions = []; updateUI();
            }
        }

        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const totalNetWorth = transactions.reduce((acc, t) => acc + t.amount, 0);
            doc.setFontSize(18); doc.text("EXPO V2: FINANCIAL REPORT", 14, 20);
            const tableBody = transactions.map(t => [t.date, t.desc.toUpperCase(), `R ${t.amount.toLocaleString()}`]);
            tableBody.push([{ content: 'TOTAL NET WORTH', colSpan: 2, styles: { halign: 'right', fontStyle: 'bold', fillColor: [240, 240, 240] } }, { content: `R ${totalNetWorth.toLocaleString(undefined, {minimumFractionDigits: 2})}`, styles: { fontStyle: 'bold', fillColor: [240, 240, 240] } }]);
            doc.autoTable({ head: [['DATE', 'LABEL', 'AMOUNT']], body: tableBody, startY: 30, theme: 'grid', headStyles: { fillColor: [0, 0, 0] } });
            doc.save("ExpoV2_Statement.pdf");
        }

        updateUI();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expo V2</title>

    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Expo V2">

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='black'/><circle cx='50' cy='50' r='25' fill='white'/></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='black'/><circle cx='50' cy='50' r='25' fill='white'/></svg>">

    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Expo%20V2%22,%22short_name%22:%22Expo%20V2%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23ffffff%22,%22theme_color%22:%22%23ffffff%22,%22icons%22:[{%22src%22:%22data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='black'/><circle cx='50' cy='50' r='25' fill='white'/></svg>%22,%22sizes%22:%22512x512%22,%22type%22:%22image/svg+xml%22,%22purpose%22:%22any%20maskable%22}]}">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #202124;
            --blue: #1a73e8;
            --green: #34a853;
            --red: #ea4335;
            --black: #1a1a1a;
            --gray: #70757a;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .app-container { width: 100%; max-width: 500px; }

        header {
            width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
        }

        .hero-card {
            background: var(--black); color: white; padding: 35px 20px;
            border-radius: 28px; box-shadow: 0 12px 24px rgba(0,0,0,0.15);
            margin-bottom: 25px; text-align: center;
        }

        .net-worth-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.8; margin-bottom: 8px; }
        .net-worth-value { 
            font-size: clamp(24px, 8vw, 42px); font-weight: 800; margin: 0;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .input-group {
            background: var(--card); padding: 25px; border-radius: 24px;
            border: 1px solid #e0e0e0; margin-bottom: 25px; box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }

        input {
            width: 100%; padding: 14px; margin: 10px 0;
            border: 1px solid #dadce0; border-radius: 12px;
            box-sizing: border-box; font-size: 16px; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--blue); }

        .btn {
            width: 100%; padding: 16px; border: none; border-radius: 14px;
            font-weight: 700; cursor: pointer; font-size: 16px; transition: 0.2s;
        }
        .btn-primary { background: var(--blue); color: white; margin-top: 10px; }
        .btn-primary:active { transform: scale(0.98); }

        .btn-outline {
            background: transparent; border: 1px solid #dadce0; color: var(--gray);
            padding: 8px 12px; font-size: 12px; width: auto; font-weight: 600;
        }

        .history-card { background: var(--card); border-radius: 24px; border: 1px solid #e0e0e0; overflow: hidden; margin-bottom: 40px; }
        .history-header { padding: 15px 20px; border-bottom: 1px solid #f1f1f1; display: flex; justify-content: space-between; align-items: center; }
        .history-item { padding: 16px 20px; border-bottom: 1px solid #f8f9fa; display: flex; justify-content: space-between; align-items: center; }
        
        .amount-pos { color: var(--green); font-weight: 700; }
        .amount-neg { color: var(--red); font-weight: 700; }

        #install-prompt {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: white; padding: 20px; border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2); display: none; z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1 style="margin:0; font-size: 22px; font-weight: 800;">EXPO V2</h1>
            <div style="display: flex; gap: 10px;">
                <button class="btn-outline" onclick="clearRecords()">Clear All</button>
                <button class="btn-outline" onclick="exportPDF()" style="color: var(--blue); border-color: var(--blue);">Download Report</button>
            </div>
        </header>

        <div class="hero-card">
            <div class="net-worth-label">Total Net Worth</div>
            <div class="net-worth-value" id="balance">R 0.00</div>
        </div>

        <div class="input-group">
            <input type="text" id="desc" placeholder="Transaction Name">
            <input type="number" id="amt" placeholder="Amount (e.g. 500 or -200)">
            <button class="btn btn-primary" onclick="addEntry()">Add Transaction</button>
        </div>

        <div class="history-card">
            <div class="history-header">
                <span style="font-size: 13px; font-weight: 700; color: var(--gray);">RECENT LEDGER</span>
            </div>
            <div id="history"></div>
        </div>
    </div>

    <div id="install-prompt">
        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 15px;">
            <div style="width:50px; height:50px; background:black; border-radius:12px; display:flex; align-items:center; justify-content:center;">
                <div style="width:20px; height:20px; background:white; border-radius:50%;"></div>
            </div>
            <div>
                <strong style="display:block;">Expo V2</strong>
                <span style="font-size: 13px; color: var(--gray);">Install to your home screen</span>
            </div>
        </div>
        <button class="btn btn-primary" onclick="installApp()" style="margin:0;">Install Now</button>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('expo_v2_data')) || [];
        let deferredPrompt;

        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const sw = `self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));`;
                const blob = new Blob([sw], {type: 'application/javascript'});
                navigator.serviceWorker.register(URL.createObjectURL(blob));
            });
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-prompt').style.display = 'block';
        });

        async function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') document.getElementById('install-prompt').style.display = 'none';
                deferredPrompt = null;
            }
        }

        function updateUI() {
            const history = document.getElementById('history');
            const balanceEl = document.getElementById('balance');
            history.innerHTML = '';
            let total = 0;

            transactions.slice().reverse().forEach((t) => {
                total += t.amount;
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <div style="display:flex; flex-direction:column;">
                        <span style="font-weight:600; font-size:14px;">${t.desc.toUpperCase()}</span>
                        <span style="font-size:11px; color:var(--gray);">${t.date}</span>
                    </div>
                    <span class="${t.amount >= 0 ? 'amount-pos' : 'amount-neg'}">
                        ${t.amount >= 0 ? '+' : ''} R ${t.amount.toLocaleString(undefined, {minimumFractionDigits: 2})}
                    </span>
                `;
                history.appendChild(item);
            });

            balanceEl.innerText = `R ${total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            localStorage.setItem('expo_v2_data', JSON.stringify(transactions));
        }

        function addEntry() {
            const desc = document.getElementById('desc').value;
            const amt = parseFloat(document.getElementById('amt').value);
            if(!desc || isNaN(amt)) return;

            transactions.push({ 
                desc: desc, 
                amount: amt, 
                date: new Date().toLocaleDateString('en-ZA') 
            });
            document.getElementById('desc').value = '';
            document.getElementById('amt').value = '';
            updateUI();
        }

        function clearRecords() {
            if (confirm("Are you sure? This will permanently delete all transaction history.")) {
                transactions = [];
                updateUI();
            }
        }

        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            const totalNetWorth = transactions.reduce((acc, t) => acc + t.amount, 0);

            doc.setFontSize(20);
            doc.text("EXPO V2 FINANCIAL REPORT", 14, 20);
            
            const tableBody = transactions.map(t => [t.date, t.desc.toUpperCase(), `R ${t.amount.toLocaleString()}`]);
            
            // Add Total row to the end of the data array
            tableBody.push([
                { content: 'TOTAL NET WORTH', colSpan: 2, styles: { halign: 'right', fontStyle: 'bold', fillColor: [240, 240, 240] } },
                { content: `R ${totalNetWorth.toLocaleString(undefined, {minimumFractionDigits: 2})}`, styles: { fontStyle: 'bold', fillColor: [240, 240, 240] } }
            ]);

            doc.autoTable({
                head: [['DATE', 'DESCRIPTION', 'AMOUNT']],
                body: tableBody,
                startY: 30,
                theme: 'grid',
                headStyles: { fillColor: [0, 0, 0] },
                columnStyles: { 2: { halign: 'right' } }
            });

            doc.save("ExpoV2_Report.pdf");
        }

        updateUI();
    </script>
</body>
</html>

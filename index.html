<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expo V2</title>

    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Expo V2">

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='black'/><circle cx='50' cy='50' r='25' fill='white'/></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='black'/><circle cx='50' cy='50' r='25' fill='white'/></svg>">

    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Expo%20V2%22,%22short_name%22:%22Expo%20V2%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23ffffff%22,%22theme_color%22:%22%23ffffff%22,%22icons%22:[{%22src%22:%22data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='black'/><circle cx='50' cy='50' r='25' fill='white'/></svg>%22,%22sizes%22:%22512x512%22,%22type%22:%22image/svg+xml%22,%22purpose%22:%22any%20maskable%22}]}">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #202124;
            --blue: #1a73e8;
            --green: #34a853;
            --red: #ea4335;
            --black: #1a1a1a;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
        }

        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .hero-card {
            background: var(--black);
            color: white;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            text-align: center;
        }

        .net-worth-label { font-size: 14px; opacity: 0.7; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Dynamic sizing for huge numbers */
        .net-worth-value { 
            font-size: clamp(24px, 8vw, 42px); 
            font-weight: 800; 
            margin: 10px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .input-group {
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #ddd;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: var(--blue);
            color: white;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }

        .history-card {
            background: var(--card);
            border-radius: 20px;
            border: 1px solid #ddd;
            overflow: hidden;
        }

        .history-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
        }

        .amount-pos { color: var(--green); font-weight: bold; }
        .amount-neg { color: var(--red); font-weight: bold; }

        /* Install Prompt Styling */
        #install-prompt {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 5px 30px rgba(0,0,0,0.2);
            display: none;
            z-index: 1000;
            border: 1px solid var(--blue);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1 style="font-size: 24px;">Expo V2</h1>
            <button onclick="exportPDF()" style="width: auto; padding: 8px 15px; font-size: 12px; margin: 0;">PDF</button>
        </header>

        <div class="hero-card">
            <div class="net-worth-label">Total Net Worth</div>
            <div class="net-worth-value" id="balance">R 0.00</div>
        </div>

        <div class="input-group">
            <input type="text" id="desc" placeholder="Transaction Name (e.g., Salary)">
            <input type="number" id="amt" placeholder="Amount (e.g., 500 or -50)">
            <button onclick="addEntry()">Add Transaction</button>
        </div>

        <div class="history-card" id="history">
            </div>
    </div>

    <div id="install-prompt">
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
            <div style="width:40px; height:40px; background:black; border-radius:8px; display:flex; align-items:center; justify-content:center;">
                <div style="width:15px; height:15px; background:white; border-radius:50%;"></div>
            </div>
            <strong>Install Expo V2?</strong>
        </div>
        <button onclick="installApp()" style="padding: 10px; margin: 0;">Install App</button>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('expo_data')) || [];
        let deferredPrompt;

        // --- PWA Logic ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const sw = `
                    self.addEventListener('install', e => e.waitUntil(caches.open('expo-v2').then(c => c.addAll(['./']))));
                    self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
                `;
                const blob = new Blob([sw], {type: 'application/javascript'});
                navigator.serviceWorker.register(URL.createObjectURL(blob));
            });
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-prompt').style.display = 'block';
        });

        async function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    document.getElementById('install-prompt').style.display = 'none';
                }
                deferredPrompt = null;
            }
        }

        // --- App Logic ---
        function updateUI() {
            const history = document.getElementById('history');
            const balanceEl = document.getElementById('balance');
            history.innerHTML = '';
            let total = 0;

            transactions.forEach((t, i) => {
                total += t.amount;
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <span>${t.desc}</span>
                    <span class="${t.amount >= 0 ? 'amount-pos' : 'amount-neg'}">
                        ${t.amount >= 0 ? '+' : ''} R ${t.amount.toLocaleString()}
                    </span>
                `;
                history.prepend(item);
            });

            balanceEl.innerText = `R ${total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            localStorage.setItem('expo_data', JSON.stringify(transactions));
        }

        function addEntry() {
            const desc = document.getElementById('desc').value;
            const amt = parseFloat(document.getElementById('amt').value);
            if(!desc || isNaN(amt)) return;

            transactions.push({ desc, amount: amt, date: new Date().toLocaleDateString() });
            document.getElementById('desc').value = '';
            document.getElementById('amt').value = '';
            updateUI();
        }

        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Expo V2 Financial Report", 14, 15);
            const data = transactions.map(t => [t.date, t.desc, `R ${t.amount}`]);
            doc.autoTable({ head: [['Date', 'Description', 'Amount']], body: data, startY: 20 });
            doc.save("ExpoV2_Report.pdf");
        }

        updateUI();
    </script>
</body>
</html>

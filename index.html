<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expo V2 | Clean PWA</title>

    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='black'/><circle cx='50' cy='50' r='25' fill='white'/></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='black'/><circle cx='50' cy='50' r='25' fill='white'/></svg>">

    <link rel="manifest" href="data:application/manifest+json,{'name':'Expo V2 Clean','short_name':'ExpoV2','start_url':'.','display':'standalone','background_color':'#ffffff','theme_color':'#ffffff','icons':[{'src':'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22black%22/><circle cx=%2250%22 cy=%2250%22 r=%2225%22 fill=%22white%22/></svg>','sizes':'512x512','type':'image/svg+xml'}]}">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root {
            --bg-light: #f8f9fa;
            --surface: #ffffff;
            --text-main: #202124;
            --text-sub: #5f6368;
            --google-blue: #1a73e8;
            --success-green: #34a853;
            --danger-red: #ea4335;
            
            --tier-starter: #34a853; /* Green */
            --tier-elite: #0d47a1;   /* Dark Blue */
            --tier-prestige: #1a1a1a; /* Black */
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .app-header h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 0;
            letter-spacing: -0.5px;
        }

        /* Hero Balance Card */
        .balance-hero {
            background: var(--tier-starter);
            color: white;
            padding: 40px;
            border-radius: 24px;
            margin-bottom: 24px;
            transition: background 0.5s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .balance-hero.tier-mid { background: var(--tier-elite); }
        .balance-hero.tier-high { background: var(--tier-prestige); }

        .balance-label { font-size: 13px; font-weight: 600; text-transform: uppercase; opacity: 0.9; }
        .balance-val { font-size: 48px; font-weight: 700; margin: 10px 0; }

        .timeline-bg {
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            width: 100%;
            margin-top: 20px;
        }

        .timeline-fill {
            height: 100%;
            background: white;
            border-radius: 10px;
            width: 0%;
            transition: width 1s ease;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--surface);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #e0e0e0;
            text-align: center;
        }

        .stat-card small { color: var(--text-sub); font-size: 12px; font-weight: 600; text-transform: uppercase; }
        .stat-card div { font-size: 22px; font-weight: 700; margin-top: 5px; }

        /* Action Form */
        .action-card {
            background: var(--surface);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid #e0e0e0;
            margin-bottom: 30px;
        }

        .input-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 12px;
        }

        input {
            padding: 14px;
            border: 1px solid #dadce0;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            background: #fafafa;
        }

        input:focus { border-color: var(--google-blue); background: #fff; }

        .btn {
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-add {
            background: var(--google-blue);
            color: white;
            width: 100%;
            margin-top: 15px;
            font-size: 16px;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #dadce0;
            color: var(--text-sub);
            padding: 8px 15px;
            font-size: 12px;
        }

        /* Activity Table */
        .history-card {
            background: var(--surface);
            border-radius: 20px;
            border: 1px solid #e0e0e0;
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 15px; text-align: left; font-size: 12px; color: var(--text-sub); border-bottom: 1px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #f1f1f1; font-size: 14px; }

        /* Install Popup */
        #install-prompt {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #202124; color: white; padding: 15px 20px; border-radius: 50px;
            display: none; align-items: center; gap: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            z-index: 1000; width: 90%; max-width: 350px;
        }

        @media (max-width: 600px) {
            .input-row, .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="app-header">
        <h1>Expo <span style="color: var(--google-blue);">V2</span></h1>
        <button class="btn btn-outline" onclick="clearRecords()">Clear Data</button>
    </header>

    <div id="hero-card" class="balance-hero">
        <div class="balance-label" id="tier-name">Starter Tier</div>
        <div class="balance-val" id="net-balance">R 0.00</div>
        <div class="timeline-bg">
            <div id="progress-bar" class="timeline-fill"></div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <small>Total Earnings</small>
            <div style="color: var(--success-green);" id="total-income">R 0.00</div>
        </div>
        <div class="stat-card">
            <small>Total Expenses</small>
            <div style="color: var(--danger-red);" id="total-expense">R 0.00</div>
        </div>
    </div>

    <div class="action-card">
        <div class="input-row">
            <input type="text" id="desc" placeholder="Transaction Title">
            <input type="number" id="amount" placeholder="Amount (±)">
            <input type="date" id="date">
        </div>
        <button class="btn btn-add" onclick="addTransaction()">Record Transaction</button>
    </div>

    <div class="history-card">
        <div style="padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee;">
            <h3 style="margin:0; font-size: 16px;">Recent Activity</h3>
            <button class="btn btn-outline" onclick="downloadPDF()">Export PDF</button>
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Description</th>
                        <th style="text-align: right;">Amount</th>
                    </tr>
                </thead>
                <tbody id="list-body"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="install-prompt">
    <span style="font-size: 14px; flex-grow: 1;">Install Expo V2 App?</span>
    <button class="btn" style="background: white; color: black; padding: 5px 15px; font-size: 12px;" id="install-button">Install</button>
</div>

<script>
    let transactions = JSON.parse(localStorage.getItem('expo_v2_clean_data')) || [];
    let deferredPrompt;

    // --- PWA SERVICE WORKER ---
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            const swCode = `
                self.addEventListener('install', e => e.waitUntil(caches.open('v1').then(c => c.addAll(['./']))));
                self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
            `;
            const blob = new Blob([swCode], {type: 'application/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        });
    }

    // --- INSTALL LOGIC ---
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('install-prompt').style.display = 'flex';
    });

    document.getElementById('install-button').addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') document.getElementById('install-prompt').style.display = 'none';
            deferredPrompt = null;
        }
    });

    // --- APP CORE LOGIC ---
    function updateUI() {
        const listBody = document.getElementById('list-body');
        listBody.innerHTML = '';
        let income = 0, expense = 0;

        const sorted = [...transactions].sort((a,b) => new Date(b.date) - new Date(a.date));

        sorted.forEach(t => {
            if(t.amount > 0) income += t.amount;
            else expense += Math.abs(t.amount);

            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${t.date}</td>
                <td style="font-weight: 500;">${t.description}</td>
                <td style="text-align: right; font-weight: 700; color: ${t.amount >= 0 ? 'var(--success-green)' : 'var(--danger-red)'}">
                    ${t.amount >= 0 ? '+' : '-'} R ${Math.abs(t.amount).toLocaleString(undefined, {minimumFractionDigits: 2})}
                </td>
            `;
            listBody.appendChild(row);
        });

        const net = income - expense;
        document.getElementById('total-income').innerText = `R ${income.toLocaleString()}`;
        document.getElementById('total-expense').innerText = `R ${expense.toLocaleString()}`;
        document.getElementById('net-balance').innerText = `R ${net.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        
        updateTier(net);
        localStorage.setItem('expo_v2_clean_data', JSON.stringify(transactions));
    }

    function updateTier(net) {
        const hero = document.getElementById('hero-card');
        const prog = document.getElementById('progress-bar');
        const label = document.getElementById('tier-name');
        
        hero.classList.remove('tier-mid', 'tier-high');
        
        let percentage = 0;
        if(net >= 100000) {
            hero.classList.add('tier-high');
            label.innerText = "Prestige Tier (R100k+)";
            percentage = 100;
        } else if (net >= 10000) {
            hero.classList.add('tier-mid');
            label.innerText = "Elite Tier (R10k - R100k)";
            percentage = ((net - 10000) / 90000) * 100;
        } else {
            label.innerText = "Starter Tier (R0 - R10k)";
            percentage = (Math.max(0, net) / 10000) * 100;
        }
        prog.style.width = Math.min(100, Math.max(0, percentage)) + "%";
    }

    function addTransaction() {
        const desc = document.getElementById('desc').value;
        const amount = parseFloat(document.getElementById('amount').value);
        const date = document.getElementById('date').value;

        if (!desc || isNaN(amount) || !date) return alert("Please fill all fields");

        transactions.push({ description: desc, amount, date });
        updateUI();
        
        document.getElementById('desc').value = '';
        document.getElementById('amount').value = '';
    }

    function clearRecords() {
        if(confirm("Permanently delete all transaction data?")) {
            transactions = [];
            updateUI();
        }
    }

    function downloadPDF() {
        if(transactions.length === 0) return alert("No data to export");
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setFontSize(22);
        doc.text("EXPO V2 FINANCIAL REPORT", 14, 20);
        
        // Grouping by Month
        const groups = {};
        transactions.forEach(t => {
            const month = t.date.substring(0, 7);
            if(!groups[month]) groups[month] = [];
            groups[month].push(t);
        });

        let currentY = 30;
        Object.keys(groups).sort().reverse().forEach(month => {
            doc.setFontSize(14);
            doc.setTextColor(100);
            doc.text(`Period: ${month}`, 14, currentY + 10);
            
            const rows = groups[month].map(t => [t.date, t.description, `R ${t.amount.toFixed(2)}`]);
            
            doc.autoTable({
                startY: currentY + 15,
                head: [['Date', 'Description', 'Amount']],
                body: rows,
                theme: 'striped',
                headStyles: { fillColor: [26, 115, 232] }
            });
            currentY = doc.lastAutoTable.finalY + 10;
        });

        doc.save(`Expo_Report_${new Date().toLocaleDateString()}.pdf`);
    }

    document.getElementById('date').valueAsDate = new Date();
    updateUI();
</script>

</body>
</html>

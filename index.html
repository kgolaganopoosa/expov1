<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expo V1 | Accounting</title>
    
    <meta name="theme-color" content="#007bff">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2845/2845873.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2845/2845873.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root {
            --primary: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --dark: #1a1a1a;
            --gray: #f4f7f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--gray);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        h1 { margin: 0; color: var(--dark); font-size: 24px; letter-spacing: 1px; }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            font-size: 14px;
        }

        .btn-clear { background: var(--danger); color: white; }
        .btn-clear:hover { background: #bd2130; }
        .btn-add { background: var(--primary); color: white; width: 100%; margin-top: 15px; }
        .btn-pdf { background: var(--dark); color: white; margin-top: 25px; width: 100%; }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .card {
            padding: 20px;
            border-radius: 12px;
            color: white;
            text-align: center;
        }

        .balance { background: var(--primary); }
        .income { background: var(--success); }
        .expense { background: var(--danger); }

        .input-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 10px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 12px;
            font-weight: bold;
            color: #666;
            text-transform: uppercase;
        }

        input {
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            background: #fafafa;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
        }

        th {
            background: #f8f9fa;
            text-align: left;
            padding: 15px;
            border-bottom: 2px solid #dee2e6;
            color: #444;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        .amt-pos { color: var(--success); font-weight: bold; }
        .amt-neg { color: var(--danger); font-weight: bold; }

        @media (max-width: 600px) {
            .dashboard { grid-template-columns: 1fr; }
            .container { padding: 15px; border-radius: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>EXPO V1</h1>
        <button class="btn btn-clear" onclick="clearRecords()">Clear</button>
    </div>

    <div class="dashboard">
        <div class="card income">
            <small>Earnings</small>
            <div id="total-income" style="font-size: 1rem; font-weight: bold;">R 0.00</div>
        </div>
        <div class="card expense">
            <small>Expenses</small>
            <div id="total-expense" style="font-size: 1rem; font-weight: bold;">R 0.00</div>
        </div>
        <div class="card balance">
            <small>Balance</small>
            <div id="net-balance" style="font-size: 1rem; font-weight: bold;">R 0.00</div>
        </div>
    </div>

    <div class="input-stack">
        <div class="input-group">
            <label>Description</label>
            <input type="text" id="desc" placeholder="e.g. Salary">
        </div>
        
        <div class="input-group">
            <label>Amount (Use '-' for expense)</label>
            <input type="number" id="amount" placeholder="e.g. 500 or -50">
        </div>

        <div class="input-group">
            <label>Date</label>
            <input type="date" id="date">
        </div>
    </div>
    
    <button class="btn btn-add" onclick="addTransaction()">Record Transaction</button>

    <div style="overflow-x:auto;">
        <table id="transaction-table">
            <thead>
                <tr>
                    <th>No.</th>
                    <th>Date</th>
                    <th>Item</th>
                    <th>Amount</th>
                </tr>
            </thead>
            <tbody id="list-body"></tbody>
        </table>
    </div>

    <button class="btn btn-pdf" onclick="downloadPDF()">Download PDF Report</button>
</div>

<script>
    // --- APP LOGIC ---
    let transactions = JSON.parse(localStorage.getItem('expo_v1_data')) || [];

    function updateUI() {
        const listBody = document.getElementById('list-body');
        listBody.innerHTML = '';
        let income = 0;
        let expense = 0;
        const displayData = [...transactions].reverse();

        displayData.forEach((t) => {
            const row = document.createElement('tr');
            const isPositive = t.amount >= 0;
            const amtClass = isPositive ? 'amt-pos' : 'amt-neg';
            const formattedAmt = `R ${Math.abs(t.amount).toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            const sign = isPositive ? '+' : '-';

            if(isPositive) income += parseFloat(t.amount);
            else expense += Math.abs(parseFloat(t.amount));

            row.innerHTML = `
                <td>#${t.id}</td>
                <td>${t.date}</td>
                <td>${t.description}</td>
                <td class="${amtClass}">${sign} ${formattedAmt}</td>
            `;
            listBody.appendChild(row);
        });

        document.getElementById('total-income').innerText = `R ${income.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        document.getElementById('total-expense').innerText = `R ${expense.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        document.getElementById('net-balance').innerText = `R ${(income - expense).toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        localStorage.setItem('expo_v1_data', JSON.stringify(transactions));
    }

    function addTransaction() {
        const desc = document.getElementById('desc').value;
        const amount = document.getElementById('amount').value;
        const date = document.getElementById('date').value;
        if (!desc || !amount || !date) return alert("Fill all fields");

        transactions.push({
            id: transactions.length + 1,
            description: desc,
            amount: parseFloat(amount),
            date: date
        });
        updateUI();
        document.getElementById('desc').value = '';
        document.getElementById('amount').value = '';
    }

    function clearRecords() {
        if(confirm("Delete all history?")) {
            transactions = [];
            updateUI();
        }
    }

    function downloadPDF() {
        if(transactions.length === 0) return alert("No data");
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("EXPO V1: FINANCIAL REPORT", 14, 20);
        const tableData = transactions.map(t => [t.id, t.date, t.description, `R ${t.amount.toFixed(2)}`]);
        doc.autoTable({ startY: 30, head: [['No.', 'Date', 'Desc', 'Amt']], body: tableData });
        doc.save("Expo_Report.pdf");
    }

    // --- PWA REGISTRATION ---
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('SW Registered'))
            .catch(err => console.log('SW Failed', err));
        });
    }

    document.getElementById('date').valueAsDate = new Date();
    updateUI();
</script>

</body>
</html>

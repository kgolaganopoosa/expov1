<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expo V2 | Midnight PWA</title>

    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='black'/><circle cx='50' cy='50' r='25' fill='white'/></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='black'/><circle cx='50' cy='50' r='25' fill='white'/></svg>">

    <link rel="manifest" href="data:application/manifest+json,{'name':'Expo V2 Midnight','short_name':'ExpoV2','start_url':'.','display':'standalone','background_color':'#000000','theme_color':'#000000','icons':[{'src':'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22black%22/><circle cx=%2250%22 cy=%2250%22 r=%2225%22 fill=%22white%22/></svg>','sizes':'512x512','type':'image/svg+xml'}]}">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root {
            --bg-black: #000000;
            --surface-dark: #121212;
            --border-white: #ffffff;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --accent-green: #00e676;
            --accent-red: #ff5252;
            --tier-starter: #1b5e20;
            --tier-elite: #1565c0;
            --tier-prestige: #212121;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-black);
            color: var(--text-primary);
            margin: 0; padding: 20px;
            display: flex; justify-content: center;
        }

        .container { width: 100%; max-width: 850px; }

        .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .app-header h1 { font-size: 24px; letter-spacing: 2px; margin: 0; }

        /* Hero Card */
        .balance-hero {
            background: var(--tier-starter);
            border: 1px solid var(--border-white);
            padding: 40px; border-radius: 20px; margin-bottom: 24px;
            transition: all 0.6s ease;
        }
        .balance-hero.tier-mid { background: var(--tier-elite); }
        .balance-hero.tier-high { background: var(--tier-prestige); }
        .balance-val { font-size: 52px; font-weight: 800; margin: 15px 0; }
        
        .timeline-bg { height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; width: 100%; margin-top: 20px; }
        .timeline-fill { height: 100%; background: var(--text-primary); width: 0%; transition: width 1s ease; }

        /* UI Elements */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--surface-dark); border: 1px solid rgba(255,255,255,0.2); padding: 24px; border-radius: 16px; }
        
        .action-frame { border: 1px solid var(--border-white); padding: 30px; border-radius: 20px; margin-bottom: 40px; }
        .input-stack { display: grid; grid-template-columns: 2fr 1fr 1.2fr; gap: 15px; }
        
        input { background: transparent; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; padding: 14px; color: white; outline: none; }
        input:focus { border-color: var(--text-primary); }

        .btn { cursor: pointer; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; border-radius: 8px;}
        .btn-main { background: var(--text-primary); color: var(--bg-black); border: none; padding: 18px; width: 100%; margin-top: 20px; }
        .btn-ghost { background: transparent; color: var(--text-primary); border: 1px solid var(--text-primary); padding: 8px 16px; font-size: 11px; }

        /* History Table */
        .history-frame { border: 1px solid var(--border-white); border-radius: 20px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 16px; font-size: 11px; color: var(--text-secondary); border-bottom: 1px solid rgba(255,255,255,0.1); }
        td { padding: 16px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* PWA Install Popup */
        #install-popup {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: white; color: black; padding: 20px; border-radius: 15px;
            display: none; align-items: center; gap: 15px; width: 90%; max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); z-index: 9999;
        }
        #install-popup p { margin: 0; font-size: 14px; font-weight: 500; }
        .btn-install { background: black; color: white; border: none; padding: 10px 15px; border-radius: 8px; font-size: 12px; }

        @media (max-width: 650px) { .input-stack, .stats-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <header class="app-header">
        <h1>EXPO / <span style="font-weight: 300;">V2</span></h1>
        <button class="btn btn-ghost" onclick="clearRecords()">Reset</button>
    </header>

    <div id="hero-card" class="balance-hero">
        <div class="balance-label" id="tier-name" style="font-size: 12px; font-weight: 600;">Starter Tier</div>
        <div class="balance-val" id="net-balance">R 0.00</div>
        <div class="timeline-bg"><div id="progress-bar" class="timeline-fill"></div></div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <small style="color: var(--text-secondary); font-size: 11px;">INCOME</small><br>
            <span style="color: var(--accent-green); font-size: 22px;" id="total-income">R 0.00</span>
        </div>
        <div class="stat-card">
            <small style="color: var(--text-secondary); font-size: 11px;">EXPENSES</small><br>
            <span style="color: var(--accent-red); font-size: 22px;" id="total-expense">R 0.00</span>
        </div>
    </div>

    <div class="action-frame">
        <div class="input-stack">
            <input type="text" id="desc" placeholder="DESCRIPTION">
            <input type="number" id="amount" placeholder="AMOUNT (±)">
            <input type="date" id="date">
        </div>
        <button class="btn btn-main" onclick="addTransaction()">Submit Entry</button>
    </div>

    <div class="history-frame">
        <div style="padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between;">
            <h2 style="margin:0; font-size: 14px;">LEDGER</h2>
            <button class="btn btn-ghost" onclick="downloadPDF()">Export PDF</button>
        </div>
        <table id="transaction-table">
            <thead><tr><th>Date</th><th>Item</th><th style="text-align: right;">Value</th></tr></thead>
            <tbody id="list-body"></tbody>
        </table>
    </div>
</div>

<div id="install-popup">
    <div style="width:40px; height:40px; background:black; border-radius:10px; display:flex; align-items:center; justify-content:center;">
        <div style="width:15px; height:15px; background:white; border-radius:50%;"></div>
    </div>
    <div style="flex-grow:1;">
        <p>Add Expo V2 to Home Screen</p>
    </div>
    <button class="btn-install" id="install-btn">Install</button>
</div>

<script>
    let transactions = JSON.parse(localStorage.getItem('expo_pwa_data')) || [];
    let deferredPrompt;

    // --- PWA LOGIC ---
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            const swCode = `
                const cacheName = 'expo-v2-cache';
                self.addEventListener('install', e => {
                    e.waitUntil(caches.open(cacheName).then(cache => cache.addAll(['./'])));
                });
                self.addEventListener('fetch', e => {
                    e.respondWith(caches.match(e.request).then(res => res || fetch(e.request)));
                });
            `;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        });
    }

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('install-popup').style.display = 'flex';
    });

    document.getElementById('install-btn').addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') document.getElementById('install-popup').style.display = 'none';
            deferredPrompt = null;
        }
    });

    // --- APP LOGIC ---
    function updateUI() {
        const listBody = document.getElementById('list-body');
        listBody.innerHTML = '';
        let income = 0, expense = 0;

        [...transactions].sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(t => {
            if(t.amount > 0) income += t.amount;
            else expense += Math.abs(t.amount);

            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${t.date}</td>
                <td>${t.description.toUpperCase()}</td>
                <td style="text-align: right; font-weight: 700; color: ${t.amount >= 0 ? 'var(--accent-green)' : 'var(--accent-red)'}">
                    ${t.amount >= 0 ? '+' : '-'} R ${Math.abs(t.amount).toLocaleString(undefined, {minimumFractionDigits: 2})}
                </td>
            `;
            listBody.appendChild(row);
        });

        const net = income - expense;
        document.getElementById('total-income').innerText = `R ${income.toLocaleString()}`;
        document.getElementById('total-expense').innerText = `R ${expense.toLocaleString()}`;
        document.getElementById('net-balance').innerText = `R ${net.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        
        updateTier(net);
        localStorage.setItem('expo_pwa_data', JSON.stringify(transactions));
    }

    function updateTier(net) {
        const hero = document.getElementById('hero-card');
        const prog = document.getElementById('progress-bar');
        const label = document.getElementById('tier-name');
        hero.classList.remove('tier-mid', 'tier-high');
        
        let percentage = 0;
        if(net >= 100000) {
            hero.classList.add('tier-high'); label.innerText = "Prestige Tier"; percentage = 100;
        } else if (net >= 10000) {
            hero.classList.add('tier-mid'); label.innerText = "Elite Tier"; percentage = ((net - 10000) / 90000) * 100;
        } else {
            label.innerText = "Starter Tier"; percentage = (Math.max(0, net) / 10000) * 100;
        }
        prog.style.width = Math.min(100, Math.max(0, percentage)) + "%";
    }

    function addTransaction() {
        const desc = document.getElementById('desc').value, amount = parseFloat(document.getElementById('amount').value), date = document.getElementById('date').value;
        if (!desc || isNaN(amount) || !date) return alert("Fill all fields");
        transactions.push({ description: desc, amount, date });
        updateUI();
        document.getElementById('desc').value = ''; document.getElementById('amount').value = '';
    }

    function clearRecords() { if(confirm("Wipe all records?")) { transactions = []; updateUI(); } }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(18); doc.text("EXPO V2: FINANCIAL REPORT", 14, 20);
        const tableData = transactions.map(t => [t.date, t.description, `R ${t.amount.toFixed(2)}`]);
        doc.autoTable({ startY: 30, head: [['DATE', 'ITEM', 'VALUE']], body: tableData });
        doc.save("Expo_Report.pdf");
    }

    document.getElementById('date').valueAsDate = new Date();
    updateUI();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expo V2 | Premium Accounting</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root {
            --google-blue: #1a73e8;
            --google-green: #34a853;
            --google-red: #ea4335;
            --dark-tier: #1a1a1b;
            --blue-tier: #0d47a1;
            --surface: #ffffff;
            --background: #f8f9fa;
            --text-main: #202124;
            --text-sub: #5f6368;
        }

        body {
            font-family: 'Google Sans', Roboto, Arial, sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        /* Header Area */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .app-header h1 {
            font-size: 28px;
            font-weight: 400;
            margin: 0;
            letter-spacing: -0.5px;
        }

        /* Dynamic Balance Card */
        .balance-hero {
            background: var(--google-green);
            color: white;
            padding: 40px;
            border-radius: 28px;
            margin-bottom: 24px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
        }

        .balance-hero.tier-mid { background: var(--blue-tier); }
        .balance-hero.tier-high { background: var(--dark-tier); }

        .balance-label { font-size: 14px; opacity: 0.9; text-transform: uppercase; letter-spacing: 1px; }
        .balance-val { font-size: 48px; font-weight: 500; margin: 10px 0; }

        /* Progress Timeline */
        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            margin-top: 20px;
        }

        .progress-bar {
            height: 100%;
            background: white;
            border-radius: 10px;
            width: 0%;
            transition: width 1s ease;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--surface);
            padding: 24px;
            border-radius: 24px;
            border: 1px solid #dadce0;
        }

        .stat-card small { color: var(--text-sub); display: block; margin-bottom: 8px; }
        .stat-card span { font-size: 20px; font-weight: 500; }
        .inc-text { color: var(--google-green); }
        .exp-text { color: var(--google-red); }

        /* Interaction Section */
        .action-card {
            background: var(--surface);
            padding: 32px;
            border-radius: 24px;
            border: 1px solid #dadce0;
            margin-bottom: 32px;
        }

        .input-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 15px;
        }

        input {
            padding: 16px;
            border: 1px solid #dadce0;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--google-blue); }

        .btn {
            padding: 16px 24px;
            border: none;
            border-radius: 50px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-size: 16px;
        }

        .btn-primary { background: var(--google-blue); color: white; margin-top: 20px; width: 100%; }
        .btn-primary:hover { box-shadow: 0 1px 3px rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15); }
        
        .btn-outline { background: transparent; border: 1px solid #dadce0; color: var(--google-blue); padding: 8px 16px; font-size: 14px;}

        /* Table */
        .history-section {
            background: var(--surface);
            border-radius: 24px;
            border: 1px solid #dadce0;
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 16px; text-align: left; font-size: 14px; color: var(--text-sub); }
        td { padding: 16px; border-top: 1px solid #eee; font-size: 15px; }

        @media (max-width: 768px) {
            .input-row { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="app-header">
        <h1>Expo <span style="font-weight: 700;">V2</span></h1>
        <button class="btn btn-outline" onclick="clearRecords()">Clear Data</button>
    </header>

    <div id="hero-card" class="balance-hero">
        <div class="balance-label">Total Net Worth</div>
        <div class="balance-val" id="net-balance">R 0.00</div>
        <div id="tier-name" style="font-size: 12px; font-weight: bold;">STARTER TIER</div>
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <small>Earnings</small>
            <span class="inc-text" id="total-income">R 0.00</span>
        </div>
        <div class="stat-card">
            <small>Expenses</small>
            <span class="exp-text" id="total-expense">R 0.00</span>
        </div>
    </div>

    <div class="action-card">
        <div class="input-row">
            <input type="text" id="desc" placeholder="Transaction name">
            <input type="number" id="amount" placeholder="Amount (e.g. -50)">
            <input type="date" id="date">
        </div>
        <button class="btn btn-primary" onclick="addTransaction()">Record Transaction</button>
    </div>

    <div class="history-section">
        <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center;">
            <h3 style="margin:0">Activity</h3>
            <button class="btn btn-outline" onclick="downloadPDF()">Download PDF Report</button>
        </div>
        <table id="transaction-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Description</th>
                    <th style="text-align: right;">Amount</th>
                </tr>
            </thead>
            <tbody id="list-body"></tbody>
        </table>
    </div>
</div>

<script>
    let transactions = JSON.parse(localStorage.getItem('expo_v2_data')) || [];

    function updateUI() {
        const listBody = document.getElementById('list-body');
        listBody.innerHTML = '';
        let income = 0;
        let expense = 0;

        // Sort by date descending
        const sorted = [...transactions].sort((a,b) => new Date(b.date) - new Date(a.date));

        sorted.forEach(t => {
            if(t.amount > 0) income += t.amount;
            else expense += Math.abs(t.amount);

            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${t.date}</td>
                <td>${t.description}</td>
                <td style="text-align: right; font-weight: 500; color: ${t.amount >= 0 ? '#34a853' : '#ea4335'}">
                    ${t.amount >= 0 ? '+' : '-'} R ${Math.abs(t.amount).toLocaleString(undefined, {minimumFractionDigits: 2})}
                </td>
            `;
            listBody.appendChild(row);
        });

        const net = income - expense;
        document.getElementById('total-income').innerText = `R ${income.toLocaleString()}`;
        document.getElementById('total-expense').innerText = `R ${expense.toLocaleString()}`;
        document.getElementById('net-balance').innerText = `R ${net.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        
        updateTier(net);
        localStorage.setItem('expo_v2_data', JSON.stringify(transactions));
    }

    function updateTier(net) {
        const hero = document.getElementById('hero-card');
        const prog = document.getElementById('progress-bar');
        const label = document.getElementById('tier-name');
        
        hero.classList.remove('tier-mid', 'tier-high');
        
        let percentage = 0;
        if(net >= 100000) {
            hero.classList.add('tier-high');
            label.innerText = "PRESTIGE TIER (R100k+)";
            percentage = 100;
        } else if (net >= 10000) {
            hero.classList.add('tier-mid');
            label.innerText = "ELITE TIER (R10k - R100k)";
            percentage = ((net - 10000) / 90000) * 100;
        } else {
            label.innerText = "STARTER TIER (R0 - R10k)";
            percentage = (Math.max(0, net) / 10000) * 100;
        }
        prog.style.width = percentage + "%";
    }

    function addTransaction() {
        const desc = document.getElementById('desc').value;
        const amount = parseFloat(document.getElementById('amount').value);
        const date = document.getElementById('date').value;

        if (!desc || isNaN(amount) || !date) return alert("Please fill all fields correctly");

        transactions.push({ description: desc, amount, date });
        updateUI();
        
        document.getElementById('desc').value = '';
        document.getElementById('amount').value = '';
    }

    function clearRecords() {
        if(confirm("This will erase all local data. Continue?")) {
            transactions = [];
            updateUI();
        }
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setFontSize(20);
        doc.text("Financial Summary Report", 14, 20);
        
        // Group by month
        const groups = {};
        transactions.forEach(t => {
            const month = t.date.substring(0, 7); // YYYY-MM
            if(!groups[month]) groups[month] = [];
            groups[month].push(t);
        });

        let finalY = 30;
        Object.keys(groups).sort().reverse().forEach(month => {
            doc.setFontSize(14);
            doc.text(`Month: ${month}`, 14, finalY + 10);
            
            const rows = groups[month].map(t => [t.date, t.description, t.amount.toFixed(2)]);
            
            doc.autoTable({
                startY: finalY + 15,
                head: [['Date', 'Description', 'Amount (R)']],
                body: rows,
                theme: 'striped'
            });
            finalY = doc.lastAutoTable.finalY;
        });

        doc.save(`Expo_Financial_Report_${new Date().toISOString().slice(0,10)}.pdf`);
    }

    document.getElementById('date').valueAsDate = new Date();
    updateUI();
</script>

</body>
</html>
